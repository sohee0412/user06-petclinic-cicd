apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic

spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic

  template:
    metadata:
      labels:
        app: petclinic

    spec:
      containers:
      - name: petclinic
        image: 450444046629.dkr.ecr.us-west-1.amazonaws.com/user06-petclinic:v15
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

        env:
        - name: MYSQL_URL
          value: jdbc:mysql://user06-db-mysql.cj6a2w86q3ko.us-west-1.rds.amazonaws.com:3306/petclinic

        - name: MYSQL_USER
          value: admin

        - name: MYSQL_PASS
          value: admin123!
